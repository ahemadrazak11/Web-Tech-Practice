<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Contributions (12 Months)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tooltip {
      position: absolute;
      background: #111;
      color: #fff;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      transform: translate(-50%, -120%);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
  </style>
</head>
<body class="bg-white flex flex-col items-center p-6 text-sm">

  <h1 class="text-xl font-semibold mb-4">GitHub Contributions (Last 12 Months)</h1>

  <div id="stats" class="mb-4 text-gray-700"></div>

  <div id="months" class="flex ml-8 mb-1 text-xs text-gray-500"></div>

  <div class="flex">
    <div class="flex flex-col mr-1 text-xs text-gray-500">
      <span>Mon</span>
      <span class="mt-3">Wed</span>
      <span class="mt-3">Fri</span>
    </div>

    <div id="calendar" class="flex gap-[2px] relative"></div>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <div class="flex items-center gap-2 mt-4 text-xs text-gray-500">
    <span>Less</span>
    <div class="w-3 h-3 bg-gray-200"></div>
    <div class="w-3 h-3 bg-green-200"></div>
    <div class="w-3 h-3 bg-green-400"></div>
    <div class="w-3 h-3 bg-green-600"></div>
    <div class="w-3 h-3 bg-green-800"></div>
    <span>More</span>
  </div>

  <script>
    const username = "ahemadrazak11";
    const apiUrl = `https://github-contributions-api.jogruber.de/v4/${username}`;

    async function fetchData() {
      const res = await fetch(apiUrl);
      const data = await res.json();

      let contributions = data.contributions;

      const today = new Date();
      today.setHours(0,0,0,0);

      const startDate = new Date(today);
      startDate.setFullYear(startDate.getFullYear() - 1);
      startDate.setDate(startDate.getDate() + 1); // include today within exact 12 months

      contributions = contributions.filter(day => {
        const d = new Date(day.date);
        d.setHours(0,0,0,0);
        return d >= startDate && d <= today;
      });

      const total = contributions.reduce((sum, d) => sum + d.count, 0);

      document.getElementById("stats").innerText = `${total} contributions in the last year`;

      buildCalendar(contributions);
    }

    function buildCalendar(contributions) {
      const map = {};
      contributions.forEach(d => map[d.date] = d);

      const calendar = document.getElementById("calendar");
      const monthsDiv = document.getElementById("months");
      const tooltip = document.getElementById("tooltip");

      calendar.innerHTML = "";
      monthsDiv.innerHTML = "";

      const today = new Date();
      today.setHours(0,0,0,0);

      const start = new Date(today);
      start.setFullYear(start.getFullYear() - 1);
      start.setDate(start.getDate() + 1);

      // align to Sunday (GitHub style)
      start.setDate(start.getDate() - start.getDay());

      const weeks = [];
      let current = new Date(start);

      for (let w = 0; w < 53; w++) {
        const week = [];
        for (let d = 0; d < 7; d++) {
          const dateStr = current.toISOString().split("T")[0];
          week.push(map[dateStr] || { date: dateStr, count: 0, level: 0 });
          current.setDate(current.getDate() + 1);
        }
        weeks.push(week);
      }

      // Month labels
      weeks.forEach((week) => {
        const firstDay = new Date(week[0].date);
        if (firstDay.getDate() <= 7) {
          const label = document.createElement("div");
          label.className = "w-[12px] text-xs text-gray-500";
          label.innerText = firstDay.toLocaleString("default", { month: "short" });
          monthsDiv.appendChild(label);
        } else {
          const spacer = document.createElement("div");
          spacer.className = "w-[12px]";
          monthsDiv.appendChild(spacer);
        }
      });

      const colors = [
        "bg-gray-200",
        "bg-green-200",
        "bg-green-400",
        "bg-green-600",
        "bg-green-800"
      ];

      weeks.forEach(week => {
        const col = document.createElement("div");
        col.className = "flex flex-col gap-[2px]";

        week.forEach(day => {
          const cell = document.createElement("div");
          cell.className = `w-[12px] h-[12px] rounded-[2px] ${colors[day.level]} hover:ring-1 hover:ring-gray-400 cursor-pointer`;

          cell.addEventListener("mouseenter", (e) => {
            tooltip.innerText = `${day.count} contributions on ${day.date}`;
            tooltip.style.left = e.pageX + "px";
            tooltip.style.top = e.pageY + "px";
            tooltip.style.opacity = 1;
          });

          cell.addEventListener("mouseleave", () => {
            tooltip.style.opacity = 0;
          });

          col.appendChild(cell);
        });

        calendar.appendChild(col);
      });
    }

    fetchData();
  </script>

</body>
</html>
