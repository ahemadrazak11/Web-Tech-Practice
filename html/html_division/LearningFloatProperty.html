<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningFloatProperty</title>
</head>

<body style="background-color: gray; ">
    <!-- Dimensional way-->

    <!-- First -->
    <div style="float: left;">
        <div style="width: 100px; height: 100px; background-color: red;"></div>
        <div style="width: 100px; height: 100px; background-color: navy;"></div>
        <div style="width: 100px; height: 100px; background-color: black;"></div>
    </div>
    <!-- Second -->
    <div style="float: right;">
        <div style="width: 100px; height: 100px; background-color: orange;"></div>
        <div style="width: 100px; height: 100px; background-color: white;"></div>
        <div style="width: 100px; height: 100px; background-color: green;"></div>
    </div>
</body>

</html>
