<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norway Flag</title>
</head>
<body style="background-color: rgb(255, 255, 255);">
    <!-- NorwayFlag Parent Container-->
    <div style="background-color: navy; width: 900px; height: 580px;">
        <!-- NorwayFlag parent child container-->
        <!-- NorwayFlag Upper Portion-->
         <!-- norway flag upper left part-->
        <div style="width: 250px; height: 250px; background-color: white; float: left;">
            <div style="width: 200px; height: 200px; background-color: red;"></div>
        </div>
        <!-- norway flag upper right part-->
        <div style="width: 550px; height: 250px; background-color: white; float: right;">
            <div style="width: 500px; height: 200px; background-color: red; float: right;"></div>
        </div>

        <!-- dummy block-->
         <div style="height: 80px; width: 100%; float: left;"></div>
        <!-- NorwayFlag lower left Portion-->
        <div style="width: 250px; height: 250px; background-color: white; float: left;">
            <div style="height: 50px; width: 100%;"></div>
            <div style="width: 200px; height: 200px; background-color: red;"></div>
        </div>
        <!-- norway flag lower right part-->
        <div style="width: 550px; height: 250px; background-color: white; float: right;">
            <div style="height: 50px; width: 100%;"></div>
            <div style="width: 500px; height: 200px; background-color: red; float: right;"></div>
        </div>
    </div>
</body>
</html>
