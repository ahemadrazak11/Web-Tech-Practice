<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultipleSections</title>
</head>
<body style="font-size: 2rem;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <!-- MainSection -->
    <div style="width: 100%; height: 710px;">
        <!-- HeaderSection-->
        <div style="background-color:  lightgray; width: 100%; height: 10%; text-align: center;">Header</div>
        <!-- BodySection-->
        <div style="width: 100%; height: 70%;">
            <!-- AsideSection-->
            <div style="width: 20%; height: 100%; float: left;">
                <div style="text-align: center; background-color: skyblue; height: 50%;">AsideOne</div>
                <div style="text-align: center; background-color: blue; height: 50%; color: white">AsideTwo</div>
            </div>
            <!-- MainSection-->
            <div style="width: 80%; height: 100%; float: left">
                <!-- MainFirstRow-->
                <div style="width: 100%;  height: 33.33%; background-color:  black;">
                    <div style="width: 25%; height: 100%; background-color: pink; float: left; text-align: center;">DOne</div>
                    <div style="width: 25%; height: 100%; background-color: lightcoral; float: left; text-align: center;">DTwo</div>
                    <div style="width: 25%; height: 100%; background-color: darkgoldenrod; float: left; text-align: center;">DThree</div>
                    <div style="width: 25%; height: 100%; background-color: red; float: left; text-align: center; color: white">DFour</div>
                </div>
                <!--MainSecondRow-->
                <div style="width: 100%; height: 33.33%; background-color: blue;">
                    <div style="width: 33.33%; height: 100%; float: left; background-color: orange; text-align: center;">DFive</div>
                    <div style="width: 33.33%; height: 100%; float: left; background-color: white; text-align: center;">DSix</div>
                    <div style="width: 33.33%; height: 100%; float: left; background-color: green; text-align: center;">DSeven</div>
                </div>
                <div style="width: 100%; height: 33.33%; background-color: green;">
                    <div style="width: 20%; height: 100%; text-align: center;float: left; background-color: lightgray;">DEight</div>
                    <div style="width: 20%; height: 100%; text-align: center;float: left; background-color: gray;">DNine</div>
                    <div style="width: 20%; height: 100%; text-align: center;float: left; background-color: lightslategray;">DTen</div>
                    <div style="width: 20%; height: 100%; text-align: center;float: left; background-color: yellowgreen;">DEleven</div>
                    <div style="width: 20%; height: 100%; text-align: center;float: left; background-color: gray; color: yellowgreen;">DTwelve</div>
                </div>
            </div>
        </div>
        <!-- FooterSection-->
        <div style="color: white; background-color:  black; width: 100%; height: 20%; text-align: center;">Footer</div>
    </div>
</body>
</html>
