<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <center>
        <form action="">
            <table>
                <caption style="font-size: 55px; font-weight: bold;">HTML Form</caption>
                <tbody style="font-size: 30px;">
                    <tr>
                        <td><label for="">Username</label></td>
                        <td><input style="font-size: 30px; background-color: lightgray; border: none; outline: none;" type="text"></td>
                    </tr>
                    <tr>
                        <td><label for="">Password</label></td>
                        <td><input style="font-size: 30px; background-color: lightgray; border: none; outline: none;" type="password"></td>
                    </tr>
                    <tr>
                        <td><label for="">Age</label></td>
                        <td><input style="font-size: 30px; background-color: lightgray; border: none; outline: none;" type="number" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">MobileNumber</label></td>
                        <td><input style="font-size: 30px; background-color: lightgray; border: none; outline: none;" type="number" name="" id=""></td>
                    </tr>
                    <tr>
                        <th><input style="font-size: 30px; background-color: green; border: none; outline: none;" type="submit" value="login"></td>
                        <th><input style="font-size: 30px; background-color: red; border: none; outline: none;" type="reset" value="cancle"></td>
                    </tr>
                </tbody>
            </table>
        </form>
    </center>
</body>
</html>
